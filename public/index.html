  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="loader">
      <style>
        #loader {
          z-index: 9999;
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background: #000;
        }
        #loader span {
          display: block;
          width: 70px;
          height: 70px;
          border: 3px solid;
          border-radius: 50%;
          border-color: transparent #fff #fff;
          animation: cssload-spin 690ms infinite linear;
        }
        @keyframes cssload-spin {
          100% {
            transform: rotate(360deg);
            transform: rotate(360deg);
          }
        }
      </style>
      <script>
        window.addEventListener('load', function () {
          var loader = document.getElementById('loader');
          loader.onanimationend = function () {
            loader.remove();
          };
          loader.style.animation = 'fade 0.3s reverse';
        });
      </script>
      <span></span>
    </div>
    <div id="root"></div>
  </body>
