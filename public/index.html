<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" href="%PUBLIC_URL%/logo.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#ffffff"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#000000"
    />
    <meta
      name="description"
      content="Pet Age calculator is the app that helps you to convert age of your pet or any other animal to human age fully free, fast and simple. 
      Useful for kids, interesting and fun for more adult people"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!-- <link rel="manifest" href="%PUBLIC_URL%/manifest.json" /> -->
    <title>Pet Age Calculator</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div class="loader">
      <style>
        .loader {
          z-index: 9999;
          position: fixed;
          top: 0;
          width: 100vw;
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background: #000;
        }
        .loader span {
          display: block;
          width: 70px;
          height: 70px;
          border: 3px solid;
          border-radius: 50%;
          border-color: transparent #fff #fff;
          animation: cssload-spin 690ms infinite linear;
        }
        @keyframes cssload-spin {
          100% {
            transform: rotate(360deg);
            transform: rotate(360deg);
          }
        }
      </style>
      <script>
        window.addEventListener("load", () => {
          const loader = document.querySelector(".loader");
          loader.onanimationend = () => loader.remove();
          loader.style.animation = "fade .3s reverse";
        });
      </script>
      <span></span>
    </div>
    <div id="root"></div>
  </body>
</html>
